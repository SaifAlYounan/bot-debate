name: mock gate

on:
  push:
  pull_request:

jobs:
  mock-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pyyaml
      # Offline, zero-network, no secrets. The pipeline's own mock
      # self-check exits non-zero on any regression in the accounting,
      # judge audit trail, or failure-mode fixtures.
      - run: python3 argbench.py --mock "Should offices ban meetings on Fridays?"
