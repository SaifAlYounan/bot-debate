# argbench configuration
#
# Model IDs drift; none are guessed here. Run
#     python3 argbench.py --list-models
# with your provider API keys exported to see what is available, then
# replace every SET_ME below.
#
# Executor for Anthropic calls. The default is `api` because it is the
# reproducible choice: exact prompts on disk, settable temperature, true
# truncation semantics.
#   api        (default) — direct HTTPS to the Anthropic Messages API,
#                          requires ANTHROPIC_API_KEY.
#   claude_cli           — opt-in convenience: shells out to `claude -p` on
#                          your existing Claude Code auth; exact usage from
#                          the CLI JSON. Trade-offs (each recorded per call
#                          and stamped as a report caveat): the CLI injects
#                          a small machine-local preamble not captured in
#                          the saved p-*.txt prompts (calls run from an
#                          empty directory with MCP disabled to minimise
#                          it); temperature is not settable (recorded as
#                          null); max_tokens is enforced via
#                          CLAUDE_CODE_MAX_OUTPUT_TOKENS and the CLI does
#                          NOT truncate at the cap — a cap-hit is detected
#                          (via usage.iterations) and the call is marked
#                          FAILED rather than silently losing text. Rule of
#                          thumb: set max_tokens 30-50% above what you
#                          would use with the direct API.
executor: api

# Roles are fixed: ADVOCATE, OPPONENT, SKEPTIC, LENS_A, LENS_B
# (lens descriptions are supplied at intake). The roster is identical for
# arms 1 and 2 by construction. If fewer providers than roles are usable
# (missing key or SET_ME), models are assigned round-robin with a warning.
roster:
  - {role: ADVOCATE, provider: anthropic, model: SET_ME}
  - {role: OPPONENT, provider: openai,    model: SET_ME}
  - {role: SKEPTIC,  provider: google,    model: SET_ME}
  - {role: LENS_A,   provider: deepseek,  model: SET_ME}
  - {role: LENS_B,   provider: mistral,   model: SET_ME}

# One editor model for BOTH arms (synthesis, gap critic, debate-synth).
editor: {provider: anthropic, model: SET_ME}

# Arm 3 solo control: one Anthropic model, one call. The same model also
# plays every role in ARM 4 (persona control: single model, arm-2 topology),
# which disentangles vendor diversity from topology — keep it a single knob
# so arm 3 vs arm 4 stays a minimal pair.
solo: {provider: anthropic, model: SET_ME}

# Every judge must come from a provider NOT in the generation roster.
# If any overlaps, argbench refuses to run without --force and the report
# carries a self-preference caveat.
#
# `judge` may be a single entry or a LIST — a panel. With a panel, every
# judge scores the same sanitised blinded lists; the scoreboard uses the
# per-metric MEDIAN across judges, per-judge outputs and the min-max
# spread are reported, and a disagreement on the headline winner is
# stamped as a caveat. Prefer 3 judges for runs you intend to quote.
# Practical note: with the full 5-provider roster above, xai is the only
# supported provider left outside the roster, so a diverse panel means
# either several distinct xai models or a --quick (3-role) roster that
# frees providers for judging.
# judge:
#   - {provider: xai, model: SET_ME}
#   - {provider: xai, model: SET_ME_2}
judge: {provider: xai, model: SET_ME}

params:
  gen_temperature: 0.7
  editor_temperature: 0.2
  judge_temperature: 0.0
  gen_max_tokens: 4000
  editor_max_tokens: 8000
  judge_max_tokens: 8000

# Per-model prices in USD per million tokens. Used for all dollar figures.
# Keep as_of current (ISO date, e.g. 2026-07-19): argbench warns loudly —
# and stamps a report caveat — when as_of is missing, unparseable, or more
# than 90 days old. The report footer prints
# "prices as of <date>, verify before quoting externally".
prices:
  as_of: SET_ME
  # example:
  # some-model-id: {input_per_mtok: 3.00, output_per_mtok: 15.00}

retries:
  max: 3            # exponential backoff with jitter on 429, 5xx, timeouts

runs: 1
